<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultrasound Transfer - Fixed</title>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; background: #121212; color: white; padding: 20px; margin: 0; }
        .dashboard { background: #1e1e1e; padding: 20px; border-radius: 15px; max-width: 500px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .nav-buttons { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        button { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.2s; }
        .btn-send    { background: #16a085; color: white; }
        .btn-receive { background: #6c3483; color: white; }
        .btn-action  { background: #27ae60; color: white; width: 100%; margin: 10px 0; font-size: 16px; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
        .progress-container { width: 100%; background: #333; height: 15px; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: #16a085; transition: width 0.1s; }
        .status { font-weight: bold; color: #aaa; margin: 10px 0; min-height: 1.4em; }
        #freq-canvas { width: 100%; height: 100px; background: #000; border-radius: 10px; margin-top: 15px; }
        .info-box { background: #1a1a1a; border-left: 4px solid #16a085; padding: 15px; text-align: left; font-size: 0.85em; margin-top: 20px; line-height: 1.5; color: #ccc; }
    </style>
</head>
<body>

<div class="dashboard">
    <h2 style="margin-bottom:20px;">Vocal Transfer (Ultrasound)</h2>
    <div class="nav-buttons">
        <button class="btn-send" onclick="showMode('send')">Send File</button>
        <button class="btn-receive" onclick="showMode('receive')">Receive File</button>
    </div>

    <hr style="border:0;border-top:1px solid #333;margin:20px 0;">

    <div id="mode-send" class="hidden">
        <input type="file" id="file-input">
        <div class="progress-container"><div id="pb-send" style="width: 0%; height: 100%; background: #16a085;"></div></div>
        <div id="st-send" class="status">Select a small file (< 5KB)</div>
        <div class="info-box">
            <b>Note:</b> Sound transfer is slow (~5 bytes/sec). Keep volume at 80% and devices close together.
        </div>
    </div>

    <div id="mode-receive" class="hidden">
        <button class="btn-action" onclick="startListening()">Start Listening</button>
        <canvas id="freq-canvas"></canvas>
        <div class="progress-container"><div id="pb-receive" style="width: 0%; height: 100%; background: #6c3483;"></div></div>
        <div id="st-receive" class="status">Ready to catch...</div>
    </div>
</div>

<script>
// --- Optimization: Lower Frequencies for Hardware Compatibility ---
const SYNC_F = 15500; 
const CLOCK_F = 15800;
const DATA_FREQS = [16100, 16400, 16700, 17000, 17300, 17600, 17900, 18200];
const FFT_SIZE = 2048;
const SYMBOL_DUR = 0.18; // 180ms per byte

function showMode(m) {
    document.getElementById('mode-send').classList.add('hidden');
    document.getElementById('mode-receive').classList.add('hidden');
    document.getElementById('mode-'+m).classList.remove('hidden');
}

// --- SENDER LOGIC ---
let audioCtx = null;

async function transmit(data, name) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const startTime = audioCtx.currentTime + 0.5;
    let t = startTime;

    // Header: [0xAA, 0x55] + nameLen + name + dataLen(2)
    const encoder = new TextEncoder();
    const nameBytes = encoder.encode(name);
    const header = new Uint8Array([0xAA, 0x55, nameBytes.length, ...nameBytes, (data.length >> 8) & 0xFF, data.length & 0xFF]);
    const fullPayload = new Uint8Array([...header, ...data]);

    // Send Preamble (Sync tone)
    playTone(SYNC_F, t, 0.5);
    t += 0.6;

    fullPayload.forEach((byte, i) => {
        // Send Clock + Data Bits
        const freqs = [CLOCK_F];
        for (let bit = 0; bit < 8; bit++) {
            if ((byte >> bit) & 1) freqs.push(DATA_FREQS[bit]);
        }
        playTone(freqs, t, SYMBOL_DUR * 0.8);
        t += SYMBOL_DUR;
        
        // Progress UI
        setTimeout(() => {
            const p = Math.round((i / fullPayload.length) * 100);
            document.getElementById('pb-send').style.width = p + "%";
            document.getElementById('st-send').innerText = `Sending: ${p}%`;
        }, (t - startTime) * 1000);
    });

    playTone(SYNC_F, t, 0.5); // End marker
}

function playTone(freq, start, dur) {
    const freqs = Array.isArray(freq) ? freq : [freq];
    freqs.forEach(f => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.value = f;
        gain.gain.setValueAtTime(0, start);
        gain.gain.linearRampToValueAtTime(0.1, start + 0.01);
        gain.gain.setValueAtTime(0.1, start + dur - 0.01);
        gain.gain.linearRampToValueAtTime(0, start + dur);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(start);
        osc.stop(start + dur);
    });
}

document.getElementById('file-input').onchange = async (e) => {
    const file = e.target.files[0];
    if (file) {
        const buffer = await file.arrayBuffer();
        transmit(new Uint8Array(buffer), file.name);
    }
};

// --- RECEIVER LOGIC ---
let recvAnalyser, recvData, recvBytes = [], isListening = false;

async function startListening() {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const ctx = new AudioContext();
    const source = ctx.createMediaStreamSource(stream);
    recvAnalyser = ctx.createAnalyser();
    recvAnalyser.fftSize = FFT_SIZE;
    source.connect(recvAnalyser);
    recvData = new Float32Array(recvAnalyser.frequencyBinCount);
    isListening = true;
    document.getElementById('st-receive').innerText = "Listening...";
    loop();
}

let lastClock = false;
function loop() {
    if (!isListening) return;
    recvAnalyser.getFloatFrequencyData(recvData);
    drawViz();

    const threshold = -75;
    const clockOn = getMag(CLOCK_F) > threshold;
    const syncOn = getMag(SYNC_F) > threshold;

    // Detect Rising Edge of Clock
    if (clockOn && !lastClock) {
        captureByte(threshold);
    }
    lastClock = clockOn;

    if (syncOn && recvBytes.length > 5) {
        processResult();
    }

    requestAnimationFrame(loop);
}

function captureByte(thr) {
    let byte = 0;
    DATA_FREQS.forEach((f, i) => {
        if (getMag(f) > thr) byte |= (1 << i);
    });
    recvBytes.push(byte);
    document.getElementById('st-receive').innerText = `Caught ${recvBytes.length} bytes...`;
    document.getElementById('pb-receive').style.width = (Math.min(100, recvBytes.length)) + "%";
}

function getMag(freq) {
    const bin = Math.round(freq / (44100 / FFT_SIZE));
    return recvData[bin];
}

function processResult() {
    isListening = false;
    const b = recvBytes;
    // Find Header [0xAA, 0x55]
    const startIdx = b.findIndex((v, i) => v === 0xAA && b[i+1] === 0x55);
    if (startIdx === -1) {
        document.getElementById('st-receive').innerText = "Error: Bad Data. Retry.";
        return;
    }

    const nameLen = b[startIdx + 2];
    const name = new TextDecoder().decode(new Uint8Array(b.slice(startIdx + 3, startIdx + 3 + nameLen)));
    const dataLen = (b[startIdx + 3 + nameLen] << 8) | b[startIdx + 4 + nameLen];
    const fileData = new Uint8Array(b.slice(startIdx + 5 + nameLen, startIdx + 5 + nameLen + dataLen));

    const blob = new Blob([fileData]);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = name; a.click();
    document.getElementById('st-receive').innerText = `SUCCESS! Saved ${name}`;
}

function drawViz() {
    const canvas = document.getElementById('freq-canvas');
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#16a085';
    for (let i = 0; i < recvData.length; i++) {
        const h = (recvData[i] + 100) * 2;
        ctx.fillRect(i * 2, canvas.height - h, 1, h);
    }
}
</script>
</body>
</html>
